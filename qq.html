<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QQ群二维码</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/favicon.png">
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #f5f7f4; background: #0b0f0f; }
    .box { width: min(420px, calc(100vw - 32px)); padding: 28px; border: 1px solid #293038; border-radius: 8px; background: #15191d; text-align: center; }
    h1 { margin: 0 0 18px; font-size: 32px; letter-spacing: 0; }
    .qr { width: 220px; height: 220px; margin: 0 auto 18px; display: grid; place-items: center; border-radius: 8px; color: #45f06a; background:
      linear-gradient(90deg, #45f06a 10px, transparent 10px) 0 0/22px 22px,
      linear-gradient(#45f06a 10px, transparent 10px) 0 0/22px 22px,
      #0e1411; font-weight: 900; }
    p { margin: 0 0 22px; color: #a5adb5; line-height: 1.7; }
    a { display: inline-flex; align-items: center; justify-content: center; height: 44px; padding: 0 18px; border-radius: 8px; color: #07110a; background: #45f06a; font-weight: 900; text-decoration: none; }
  </style>
</head>
<body>
  <main class="box">
    <h1>QQ群二维码</h1>
    <div class="qr">QR CODE</div>
    <p>QQ群入口页面，可在这里替换为真实二维码图片和入群说明。</p>
    <a href="index.html">返回首页</a>
  </main>
</body>
</html>
