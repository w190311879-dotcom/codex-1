        }));
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "登录失败");
        authLayer.classList.remove("active");
        document.querySelector("#authOpen").title = "已登录";
      } catch (error) {
        document.querySelector(".auth-note").textContent = error.message || "登录失败，请稍后重试。";
      }
    });
    document.querySelector("#mainNav").addEventListener("click", (event) => {
      const moreButton = event.target.closest("#moreNav");
      if (moreButton) {
        event.preventDefault();
        document.querySelector("#moreWrap")?.classList.toggle("open");
        return;
      }
      const link = event.target.closest("a");
      if (link) {
        event.preventDefault();
        activeTag = "";
        activeCategory = link.dataset.title;
        history.pushState(null, "", categoryHref(activeCategory));
        document.querySelector("#moreWrap")?.classList.remove("open");
        currentPage = 1;
        renderNav();
        document.querySelector("#mainNav").classList.remove("open");
        renderPosts();
      }
    });
    window.addEventListener("popstate", () => {
      activeTag = tagFromLocation();
      activeCategory = categoryFromLocation();
      currentPage = pageFromLocation();
      renderNav();
      renderPosts();
    });
    renderNav();
    if (!postsArePartial) renderPosts();
    renderRecommend();
    renderAds();
    loadSiteSettingsFromApi();
    loadPostsFromApi();
    window.lucide?.createIcons?.();
  </script>
</body>
</html>
