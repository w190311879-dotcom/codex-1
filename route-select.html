  <script>
    const config = window.POSTWAVE_CONFIG || {};
    const title = String(config.routeSelectorTitle || "51春梦");

    const routes = document.querySelector("#routes");
    function addRoute({ href, label, host }) {

      anchor.className = "route";
      anchor.href = href;
      const name = document.createElement("strong");
      name.textContent = label;
      const target = document.createElement("span");
      target.textContent = host;
      anchor.append(name, target);
      routes.append(anchor);
    }
