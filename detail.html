    .actions { display:flex; align-items:center; gap:9px; }

    :root.light .icon-btn { background:#fff; }
    .search-panel { display:none; max-width:760px; margin:18px auto 0; }
    .search-panel.active { display:block; }
    .search-box { height:50px; display:flex; align-items:center; gap:10px; padding:0 14px; border:1px solid var(--line); border-radius:8px; background:var(--card); color:var(--muted); }
    .search-box input { width:100%; border:0; outline:0; color:var(--text); background:transparent; }
    .search-results { display:grid; gap:8px; margin-top:10px; }

    .page { max-width:1180px; margin:0 auto; padding:30px 18px 52px; }

    .breadcrumb a { color:var(--green); }
    .article-head { padding:42px 0 34px; text-align:center; }

    .body { padding:0; border:0; border-radius:0; background:transparent; color:var(--text); font-size:22px; line-height:1.95; white-space:pre-wrap; }
    .media { width:min(800px, 100%); margin:0 auto; overflow:hidden; border:1px solid var(--line); border-radius:8px; background:var(--card); }

    .image-media img { display:block; width:100%; height:auto; object-fit:contain; }
    .video-media { display:grid; place-items:center; background:#000; }
    .video-media.ratio-16-9 { aspect-ratio:16 / 9; }
    .video-media.ratio-9-16 { width:min(420px, 100%); aspect-ratio:9 / 16; }
    .video-media video,
    .video-media .dplayer,

    .tags { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin:12px 0 0; }
    .tag { min-height:34px; display:inline-flex; align-items:center; padding:0 12px; border:1px solid rgba(40,212,176,.55); border-radius:999px; color:var(--green); background:rgba(40,212,176,.08); font-weight:900; }
    .notice { margin:24px auto 0; max-width:940px; padding:20px; border:1px solid rgba(40,212,176,.48); border-radius:8px; background:rgba(40,212,176,.08); line-height:1.8; }
    .notice strong { color:var(--green); }
    .prev-next { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:26px auto; max-width:940px; }
    .pn { padding:16px; border:1px solid var(--line); border-radius:8px; background:var(--card); color:var(--muted); font-weight:900; }
    .pn span { display:block; margin-top:6px; color:var(--text); }
    .ad-stack { display:grid; gap:12px; margin:0 auto 28px; max-width:940px; }
    .ad-item { min-height:92px; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:18px; border:1px solid rgba(40,212,176,.45); border-radius:8px; background:linear-gradient(90deg, rgba(17,28,20,.96), rgba(22,24,28,.92)); }

    .ad-item span { color:var(--muted); font-weight:800; }

    .section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .section-head h2 { margin:0; color:var(--green); font-size:30px; letter-spacing:0; }
    .square-grid { display:grid; grid-template-columns:repeat(10, 1fr); gap:10px; }
    .square-ad { aspect-ratio:1; position:relative; overflow:hidden; border:1px solid var(--line); border-radius:8px; background:var(--card); }
    .square-ad img { width:100%; height:100%; object-fit:cover; display:block; }
    .guess-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
    .guess { position:relative; min-height:170px; overflow:hidden; border:1px solid var(--line); border-radius:8px; isolation:isolate; }
    .guess img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:-2; }
    .guess::after { content:""; position:absolute; inset:0; background:linear-gradient(0deg,rgba(4,7,8,.78),rgba(4,7,8,.16)); z-index:-1; }
    .guess h3 { position:absolute; left:14px; right:14px; bottom:12px; margin:0; color:#fff; font-size:18px; letter-spacing:0; }
    .refresh { height:38px; border:1px solid var(--line); border-radius:8px; color:var(--green); background:var(--card); cursor:pointer; font-weight:900; }
    .comments { margin:42px auto 0; max-width:1120px; padding:34px 28px 48px; border:1px solid var(--line); border-radius:8px; background:var(--card); box-shadow:0 18px 60px rgba(0,0,0,.18); }
    .comments h2 { margin:0 0 24px; color:var(--green); font-size:36px; letter-spacing:0; }
    .comments textarea { width:100%; height:150px; padding:18px; border:1px solid rgba(40,212,176,.42); border-radius:8px; color:var(--text); background:rgba(8,14,14,.62); resize:vertical; outline:0; font-size:20px; }

    :root.light .comment-row input { background:#fff; }

    .comments textarea::placeholder, .comment-row input::placeholder { color:var(--muted); }
    .comment-row { display:flex; gap:14px; margin-top:18px; align-items:center; }
    .comment-row input { width:310px; height:54px; padding:0 16px; border:1px solid rgba(40,212,176,.42); border-radius:8px; color:var(--text); background:rgba(8,14,14,.62); outline:0; font-size:20px; }
    .captcha { width:92px; height:42px; display:inline-grid; place-items:center; border:1px solid rgba(40,212,176,.42); border-radius:6px; color:var(--green); background:rgba(40,212,176,.08); font-family:Georgia, serif; font-size:24px; }
    .submit { width:100%; height:66px; margin-top:18px; border:0; border-radius:8px; color:#07110a; background:var(--green); font-size:24px; font-weight:900; cursor:pointer; }

    .comment-count { margin:58px 0 24px; color:var(--text); font-size:36px; font-weight:700; }
    .comment-list { display:grid; gap:0; border-top:1px solid var(--line); }
    .comment { display:grid; grid-template-columns:92px 1fr auto; gap:20px; align-items:start; padding:24px 0; border-bottom:1px solid var(--line); }
    .comment-logo { color:var(--text); font-size:28px; font-weight:900; padding-top:10px; }
    .comment strong { color:var(--green); font-size:24px; }

    .reply { color:var(--green); font-size:20px; font-weight:900; padding-top:20px; }
    .footer-icons { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:34px 0 26px; }
    .footer-icons a { min-height:78px; display:grid; place-items:center; gap:6px; border:1px solid var(--line); border-radius:8px; background:var(--card); color:var(--muted); font-weight:900; }
    .intro { padding:20px; border:1px solid var(--line); border-radius:8px; background:var(--card); color:var(--muted); font-size:15px; line-height:1.8; font-weight:700; }
    .footer-links { display:flex; flex-wrap:wrap; justify-content:center; gap:14px; margin:24px 0; color:#d8dedb; font-weight:800; }
    :root.light .footer-links { color:#3d463f; }
    .social-row { display:flex; justify-content:center; gap:12px; margin-bottom:20px; }
    .legal { border-top:1px solid var(--line); padding-top:18px; color:var(--muted); text-align:center; font-size:12px; line-height:1.8; }
    .legal a { margin:0 8px; color:var(--muted); }
    .modal-layer { position:fixed; inset:0; z-index:50; display:none; place-items:center; padding:18px; background:rgba(0,0,0,.58); backdrop-filter:blur(12px); }
    .modal-layer.active { display:grid; }
    .auth-modal { width:min(420px,100%); border:1px solid var(--line); border-radius:8px; background:var(--card); box-shadow:0 24px 80px rgba(0,0,0,.35); }
    .auth-head { display:flex; align-items:center; justify-content:space-between; padding:18px; border-bottom:1px solid var(--line); }
    .auth-head h2 { margin:0; font-size:24px; letter-spacing:0; }
    .auth-body { display:grid; gap:12px; padding:18px; }
    .auth-tabs { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .auth-tab, .auth-submit { height:42px; border:1px solid var(--line); border-radius:8px; color:var(--text); background:var(--bg); font-weight:900; cursor:pointer; }
    .auth-tab.active, .auth-submit { color:#07110a; border-color:var(--green); background:var(--green); }
    .auth-body input { height:44px; padding:0 12px; border:1px solid var(--line); border-radius:8px; color:var(--text); background:var(--bg); outline:0; }
    .auth-note { margin:0; color:var(--muted); font-size:13px; line-height:1.7; }
    @media (max-width:900px) {
      .topbar { background:rgba(18,22,22,.94); overflow:visible; }
      .topbar-inner { position:relative; height:auto; min-height:84px; grid-template-columns:auto minmax(0, 1fr) auto; padding:10px 14px 4px; gap:8px; }
      .mobile-nav-toggle { min-width:92px; height:42px; display:inline-flex; align-items:center; justify-content:center; gap:6px; border:0; border-radius:999px; color:#e9efec; background:rgba(255,255,255,.12); font-weight:900; cursor:pointer; }
      .brand { position:absolute; left:50%; top:50%; transform:translate(-50%, -50%); justify-self:center; }
      .brand-mark { width:clamp(112px, 34vw, 150px); height:68px; }
      .actions { justify-self:end; gap:6px; }
      .icon-btn { width:42px; height:42px; border-radius:999px; background:rgba(255,255,255,.1); }
      .mobile-hide { display:none; }
      .nav { position:fixed; left:0; top:0; bottom:auto; z-index:60; width:min(280px, 78vw); height:100vh; min-height:100dvh; display:flex; flex-direction:column; justify-content:flex-start; align-items:stretch; gap:8px; padding:86px 16px 18px; overflow-y:auto; transform:translate3d(-105%, 0, 0); transition:transform .22s ease; border-right:1px solid var(--line); background:rgba(15,19,21,.98); box-shadow:18px 0 48px rgba(0,0,0,.32); }
      .nav.open { transform:translateX(0); }
      .nav a, .nav-more { width:100%; justify-content:flex-start; min-height:44px; }
      .more-wrap { display:grid; }
      .more-menu { position:static; display:grid; min-width:0; margin-top:6px; box-shadow:none; }
      .search-panel { display:block; max-width:none; margin:6px 14px 10px; }
      .search-box { height:56px; border-radius:999px; padding:0 16px 0 20px; background:rgba(255,255,255,.12); }
      .page { padding:24px 14px 40px; }
      .breadcrumb { font-size:18px; }
      .article-head { padding:28px 0 24px; }
      .article-head h1 { font-size:clamp(28px, 8vw, 40px); }
      .meta { font-size:17px; }
      .square-grid { grid-template-columns:repeat(5,1fr); }
      .guess-grid, .prev-next, .footer-icons { grid-template-columns:1fr; }
      .comment-row { flex-direction:column; align-items:stretch; }
      .comment-row input, .captcha { width:100%; }
      .comment { grid-template-columns:1fr; }
      .comments { padding:24px 18px 34px; }
      .comments h2, .comment-count { font-size:32px; }
      .text-ad-grid { grid-template-columns:repeat(2, minmax(0, 1fr)); }

      .ad-item { flex-direction:column; align-items:flex-start; }
      .ad-image { width:100%; height:120px; flex-basis:auto; }
    }
  </style>
</head>
<body>

    function guess() {
      const shuffled = [...posts].sort(() => Math.random() - .5).slice(0, 4);
      document.querySelector("#guessGrid").innerHTML = shuffled.map((post) => `<a class="guess" href="detail.html?id=${encodeURIComponent(post.id)}"><img src="${safeUrl(post.image)}" alt="${escapeHtml(post.title)}"><h3>${escapeHtml(post.title)}</h3></a>`).join("");
      window.lucide?.createIcons?.();
    }
    async function fetchApprovedComments() {
      if (!current.id) return [];
      try {
        const response = await fetch(apiPath(`/api/comments?postId=${encodeURIComponent(current.id)}&status=approved`), apiOptions({ cache: "no-store" }));
        if (!response.ok) return [];
        const data = await response.json();
        return Array.isArray(data.comments) ? data.comments : [];
      } catch (_error) {
        return [];
      }
    }
    async function renderComments() {
      const comments = await fetchApprovedComments();
      document.querySelector("#commentCount").textContent = comments.length ? `已有 ${comments.length} 条评论` : "暂无评论";
      const commentLogo = siteConfig.commentLogoText || "51暗网";
      document.querySelector("#commentList").innerHTML = comments.length
        ? comments.map((item) => `<div class="comment"><div class="comment-logo">${escapeHtml(commentLogo)}</div><div><strong>${escapeHtml(item.name)}</strong><small>${escapeHtml(item.time || "刚刚")}</small><p>${escapeHtml(item.text)}</p></div><a class="reply" href="#commentText">回复</a></div>`).join("")
        : `<div class="comment"><div class="comment-logo">${escapeHtml(commentLogo)}</div><div><strong>暂无评论</strong><small>成为第一个真实评论的人</small><p>评论提交后会进入后台审核，通过后显示在这里。</p></div></div>`;
    }

    function isHlsMedia(item, url) {
      return item?.playbackType === "hls" || /\.m3u8(?:[?#]|$)/i.test(String(url || ""));
    }
    function attachVideoFallback(container, url, posterUrl, hls) {
      const video = document.createElement("video");
      video.controls = true;
      video.playsInline = true;
      video.preload = "metadata";
      if (posterUrl) video.poster = safeUrl(posterUrl);
      container.innerHTML = "";
      container.appendChild(video);
      if (hls && window.Hls?.isSupported?.()) {
        const player = new window.Hls();
        player.loadSource(url);
        player.attachMedia(video);
        return;
      }
      video.src = url;
    }
    async function mountVideoPlayer(container, mediaId) {
      try {
        const item = await fetchMediaById(mediaId);
        const url = await mediaUrl(item);
        if (!url) {
          container.closest(".media")?.remove();
          return;
        }
        if (item?.aspect === "9-16") {
          container.closest(".media")?.classList.remove("ratio-16-9");
          container.closest(".media")?.classList.add("ratio-9-16");
        }
        const posterUrl = item?.posterUrl || "";
        const hls = isHlsMedia(item, url);
        container.innerHTML = "";
        if (window.DPlayer) {
          new window.DPlayer({
            container,
            screenshot: false,
            hotkey: true,
            video: {
              url: safeUrl(url),
              type: hls ? "hls" : "auto",
              pic: posterUrl ? safeUrl(posterUrl) : undefined
            }
          });
          return;
        }
        attachVideoFallback(container, safeUrl(url), posterUrl, hls);
      } catch (_error) {
        container.closest(".media")?.remove();
      }
    }
    function renderContentFlow() {
      const flow = document.querySelector("#contentFlow");
      const body = current.body || "";
      if (!body.includes("[图片") && !body.includes("[视频")) {
        flow.innerHTML = `<div class="body"></div>`;
        flow.querySelector(".body").textContent = body;
        return;
      }
      const parts = body.split(/(\[图片(?::\d+)?\]|\[视频(?::[^\]]+)?\])/g);
      flow.innerHTML = "";
      parts.forEach((part) => {
        if (!part) return;
        if (part.startsWith("[图片")) {
          const match = part.match(/\[图片(?::(\d+))?\]/);
          const imgIndex = match && match[1] ? Number(match[1]) : 0;
          const img = (current.bodyImages || [])[imgIndex] || "";
          if (img) flow.insertAdjacentHTML("beforeend", `<div class="media image-media"><img src="${safeUrl(img)}" alt="${escapeHtml(current.title)}"></div>`);
        } else if (part.startsWith("[视频")) {
          const match = part.match(/\[视频(?::([^\]]+))?\]/);
          const videoId = match && match[1] ? match[1] : "";
          if (videoId) flow.insertAdjacentHTML("beforeend", `<div class="media video-media ratio-16-9"><div class="hls-player" data-media-video="${escapeHtml(videoId)}"></div></div>`);
        } else {
          if (!part.trim()) return;
          const div = document.createElement("div");
          div.className = "body";
          div.textContent = part.replace(/^\n+|\n+$/g, "");
          flow.appendChild(div);
        }
      });
      flow.querySelectorAll("[data-media-video]").forEach((playerEl) => mountVideoPlayer(playerEl, playerEl.dataset.mediaVideo));
    }
    function cleanTag(tag) { return String(tag).replace(/^#+/, ""); }
    async function renderDetailPage() {
      renderSiteChrome();
      renderNav();
      document.title = `${current.title} - 51春梦`;
      document.querySelector("#crumbTitle").textContent = current.title;
      document.querySelector("#title").textContent = current.title;
      document.querySelector("#author").textContent = current.author;
      document.querySelector("#date").textContent = current.date;
      document.querySelector("#category").textContent = current.category;
      renderContentFlow();
      document.querySelector("#tags").innerHTML = (current.tags || []).map((tag) => `<span class="tag">${escapeHtml(cleanTag(tag))}</span>`).join("");
      document.querySelector("#officialNotice").textContent = notice;
      const prev = index >= 0 && posts.length > 1 ? posts[(index - 1 + posts.length) % posts.length] : null;
      const next = index >= 0 && posts.length > 1 ? posts[(index + 1) % posts.length] : null;
      const prevEl = document.querySelector("#prevPost");
      const nextEl = document.querySelector("#nextPost");
      if (prev) {
        prevEl.href = `detail.html?id=${encodeURIComponent(prev.id)}`;
        prevEl.querySelector("span").textContent = prev.title;
      } else {
        prevEl.removeAttribute("href");
        prevEl.querySelector("span").textContent = "暂无";
      }
      if (next) {
        nextEl.href = `detail.html?id=${encodeURIComponent(next.id)}`;
        nextEl.querySelector("span").textContent = next.title;
      } else {
        nextEl.removeAttribute("href");
        nextEl.querySelector("span").textContent = "暂无";
      }
      await renderDetailAds();
      guess();
      renderComments();
      updateCommentUserState();
    }
    renderDetailPage();
    document.querySelector("#refreshGuess").addEventListener("click", guess);
    document.querySelector("#themeToggle").addEventListener("click", () => {
      const isLight = document.documentElement.classList.toggle("light");
      localStorage.setItem("postwave_theme", isLight ? "light" : "dark");
    });
    function normalizeSearchValue(value) {
      if (Array.isArray(value)) return value.join(" ");
      return String(value || "");
    }
    function postSearchText(post) {
      return [
        post.title,
        post.body,
        post.keywords,
        post.tags,
        post.category,
        post.categories
      ].map(normalizeSearchValue).join(" ").replace(/#/g, "").toLowerCase();
    }
    document.querySelector("#searchToggle").addEventListener("click", () => {
      document.querySelector("#searchPanel").classList.toggle("active");
      document.querySelector("#searchInput").focus();
    });
    document.querySelector("#searchInput").addEventListener("input", (event) => {
      const q = event.target.value.trim().replace(/#/g, "").toLowerCase();
      const results = q ? posts.filter((post) => postSearchText(post).includes(q)).slice(0, 8) : [];
      document.querySelector("#searchResults").innerHTML = results.map((post) => `<a href="detail.html?id=${encodeURIComponent(post.id)}">${escapeHtml(post.title)}</a>`).join("");
    });
    const authLayer = document.querySelector("#authLayer");
    function frontCommentName() {
      return siteConfig.commentLogoText || "注册用户";
    }
    async function fetchUserSession() {
      try {
        const response = await fetch(apiPath("/api/user/session"), apiOptions({ cache: "no-store" }));
        if (!response.ok) return null;
        const data = await response.json();
        return data.authenticated ? data.user : null;
      } catch (_error) {
        return null;
      }
    }
    async function loadUserSession() {
      currentUser = await fetchUserSession();
      updateCommentUserState();
    }
    function updateCommentUserState() {
      const displayName = frontCommentName();
      document.querySelector("#commentName").value = currentUser ? displayName : "";
      document.querySelector("#commentName").placeholder = currentUser ? displayName : "请先登录/注册后评论";
      document.querySelector("#commentName").readOnly = true;
      document.querySelector("#commentAuthNote").textContent = currentUser ? `已登录，可用统一前端名字“${displayName}”评论。提交后进入后台审核，通过后展示。` : "评论需要登录/注册，提交后由后台审核，通过后展示。";
    }
    document.querySelector("#authOpen").addEventListener("click", () => authLayer.classList.add("active"));
    document.querySelector("#authClose").addEventListener("click", () => authLayer.classList.remove("active"));
    authLayer.addEventListener("click", (event) => {
      if (event.target === authLayer) authLayer.classList.remove("active");
    });
    document.querySelectorAll("[data-auth-mode]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-auth-mode]").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        authMode = button.dataset.authMode || "login";
        document.querySelector("#authTitle").textContent = authMode === "login" ? "登录" : "注册";
      });
    });
    document.querySelector("#authForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const account = document.querySelector("#authAccount").value.trim();
      const password = document.querySelector("#authPassword").value.trim();
      if (!account || !password) return;
      try {
        const response = await fetch(apiPath(authMode === "register" ? "/api/user/register" : "/api/user/login"), apiOptions({
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ account, password })
        }));
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "登录失败");
        currentUser = data.user || null;
        authLayer.classList.remove("active");
        document.querySelector("#authOpen").title = "已登录";
        updateCommentUserState();
      } catch (error) {
        document.querySelector(".auth-note").textContent = error.message || "登录失败，请稍后重试。";
      }
    });
    document.querySelector("#submitComment").addEventListener("click", async () => {
      if (!currentUser) {
        authLayer.classList.add("active");
        document.querySelector("#commentAuthNote").textContent = "请先登录/注册，再提交评论。";
        return;
      }
      const text = document.querySelector("#commentText").value.trim();
      if (!text) return;
      try {
        const response = await fetch(apiPath("/api/comments"), apiOptions({
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ postId: current.id, postTitle: current.title, text })
        }));
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "评论提交失败");
        document.querySelector("#commentText").value = "";
        document.querySelector("#commentAuthNote").textContent = "评论已提交，等待后台审核通过后展示。";
      } catch (error) {
        document.querySelector("#commentAuthNote").textContent = error.message || "评论提交失败，请稍后重试。";
      }
    });
    updateCommentUserState();
    loadUserSession();
    loadSiteSettingsFromApi();
    refreshPostsFromApiForDetail();
    window.lucide?.createIcons?.();
  </script>
</body>
</html>
