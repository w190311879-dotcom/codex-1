<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PublishHub 登录</title>
  <link rel="icon" type="image/png" href="/assets/favicon-51.png">
  <link rel="apple-touch-icon" href="/assets/favicon-51.png">
  <script defer src="/vendor/lucide/lucide.min.js" onload="window.lucide?.createIcons?.()"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #111827; background: #fff; letter-spacing: 0; }
    .brand { position: fixed; top: 38px; left: 42px; display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 900; }
    .screen { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }
    .visual { display: grid; place-items: center; background: #eef3f8; }
    .logo-art { width: 320px; height: 320px; position: relative; }
    .logo-art::before { content: ""; position: absolute; inset: 24px 44px; border-radius: 36% 36% 8px 36%; background: linear-gradient(145deg, #68f2c8, #079e73); transform: rotate(0deg); }
    .logo-art::after { content: ""; position: absolute; left: 42px; top: 100px; width: 230px; height: 170px; border: 3px solid rgba(255,255,255,.72); border-radius: 14px; background: linear-gradient(120deg, rgba(255,255,255,.9), rgba(255,255,255,.1)); clip-path: polygon(0 0, 100% 0, 52% 100%); }
    .login-wrap { display: grid; place-items: center; padding: 32px; }
    .card { width: min(410px, 100%); padding: 30px; border: 1px solid #dce4ee; border-radius: 12px; background: #fff; box-shadow: 0 2px 10px rgba(15, 23, 42, .12); }
    h1 { margin: 0 0 6px; font-size: 30px; letter-spacing: 0; }
    p { margin: 0 0 26px; color: #64748b; font-weight: 700; }
    label { display: grid; gap: 8px; margin-bottom: 14px; font-weight: 800; }
    input { height: 44px; padding: 0 14px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 16px; outline: 0; }
    input:focus { border-color: #111827; }
    button { width: 100%; height: 44px; margin-top: 6px; border: 0; border-radius: 6px; color: #fff; background: #18181b; font-weight: 900; cursor: pointer; }
    .hint { margin-top: 18px; padding-top: 18px; border-top: 1px solid #e5e7eb; color: #64748b; font-size: 14px; }
    .float { position: fixed; right: 20px; top: 50%; display: grid; gap: 16px; transform: translateY(-50%); }
    .float a { width: 46px; height: 46px; display: grid; place-items: center; border-radius: 999px; color: #f58aa8; background: #fff; box-shadow: 0 4px 18px rgba(15,23,42,.14); }
    @media (max-width: 900px) { .screen { grid-template-columns: 1fr; } .visual { min-height: 280px; } .brand { position: absolute; } }
  </style>
</head>
<body>
  <a class="brand" href="index.html"><i data-lucide="sparkles"></i><span>PublishHub</span></a>
  <main class="screen">
    <section class="visual"><div class="logo-art" aria-hidden="true"></div></section>
    <section class="login-wrap">
      <form class="card" id="loginForm">
        <h1>登录</h1>
        <p>欢迎使用发布系统</p>
        <label>账户<input id="loginAccount" autocomplete="username"></label>
        <label>密码<input id="loginPassword" type="password" autocomplete="current-password"></label>
        <label>项目码<input id="loginProject" value="03221251"></label>
        <button>登录</button>
        <div class="hint">请在上方输入您的账户、密码和项目码登录账户</div>
      </form>
    </section>
  </main>
  <div class="float">
    <a href="index.html" title="返回前台"><i data-lucide="layout-grid"></i></a>
    <a href="app.html" title="App 下载"><i data-lucide="languages"></i></a>
  </div>
  <script src="/config.js"></script>
  <script>
    const appConfig = window.POSTWAVE_CONFIG || {};
    function apiPath(path) {
      const base = String(appConfig.apiBaseUrl || "").replace(/\/+$/, "");
      return base ? `${base}${path}` : path;
    }
    function apiOptions(options = {}) {
      return { credentials: "include", ...options };
    }
    window.lucide?.createIcons?.();
    document.querySelector("#loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const account = document.querySelector("#loginAccount").value.trim();
      const password = document.querySelector("#loginPassword").value.trim();
      try {
        const response = await fetch(apiPath("/api/login"), apiOptions({
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ account, password })
        }));
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "账号或密码错误");
        localStorage.setItem("postwave_admin", "1");
        localStorage.setItem("postwave_current_author", data.user?.name || account);
        if (data.csrfToken) localStorage.setItem("postwave_csrf", data.csrfToken);
        const next = new URLSearchParams(location.search).get("next") || "admin.html";
        location.href = next;
      } catch (error) {
        alert(error.message || "登录失败，请稍后重试。");
      }
    });
  </script>
</body>
</html>
